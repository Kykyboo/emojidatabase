<!DOCTYPE html>
<html lang="en" x-data="emojiApp()" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmojiHub | Modern Unicode Browser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .emoji-card:hover { transform: translateY(-5px); }
        .sticky-nav { backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 border-b border-slate-200 dark:border-slate-800 sticky-nav">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent">
                EmojiHub
            </h1>
            
            <div class="flex items-center gap-4 w-full md:w-auto">
                <input 
                    type="text" 
                    x-model="search" 
                    placeholder="Search emojis (e.g., 'fire', 'smile')..." 
                    class="w-full md:w-80 px-4 py-2 rounded-full border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                >
                <button @click="darkMode = !darkMode" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                    <template x-if="!darkMode">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </template>
                    <template x-if="darkMode">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </template>
                </button>
            </div>
        </div>
        
        <div class="max-w-7xl mx-auto px-4 py-2 overflow-x-auto whitespace-nowrap hidden md:block">
            <template x-for="cat in categories" :key="cat">
                <button 
                    @click="scrollToCategory(cat)"
                    x-text="cat" 
                    class="text-xs font-medium mr-4 px-3 py-1 rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-blue-500 hover:text-white transition-all capitalize">
                </button>
            </template>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <template x-if="loading">
            <div class="flex flex-col items-center justify-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
                <p class="mt-4 text-slate-500">Loading Unicode database...</p>
            </div>
        </template>

        <div x-show="!loading" x-cloak>
            <template x-for="category in filteredEmojis" :key="category.name">
                <section :id="category.name" class="mb-12">
                    <h2 class="text-xl font-bold mb-6 pb-2 border-b border-slate-200 dark:border-slate-800 capitalize" x-text="category.name"></h2>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4">
                        <template x-for="emoji in category.items" :key="emoji.slug">
                            <button 
                                @click="copyEmoji(emoji.character, $el)"
                                class="emoji-card relative group flex flex-col items-center p-4 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 hover:shadow-md transition-all duration-200"
                            >
                                <span class="text-4xl mb-2" x-text="emoji.character"></span>
                                <span class="text-[10px] uppercase tracking-tighter text-slate-400 dark:text-slate-500 overflow-hidden text-ellipsis w-full" x-text="emoji.unicodeName"></span>
                                <code class="text-[9px] text-blue-500 mt-1" x-text="emoji.codePoint"></code>
                                
                                <span class="tooltip absolute -top-8 left-1/2 -translate-x-1/2 bg-black text-white text-[10px] py-1 px-2 rounded opacity-0 transition-opacity">Copied!</span>
                            </button>
                        </template>
                    </div>
                </section>
            </template>
        </div>
    </main>

    <script>
        function emojiApp() {
            return {
                darkMode: window.matchMedia('(prefers-color-scheme: dark)').matches,
                loading: true,
                search: '',
                allEmojis: [],
                categories: [],
                
                async init() {
                    try {
                        // Fetching from a comprehensive Emoji API source
                        const response = await fetch('https://emoji-api.com/emojis?access_key=acc6130473244fa361f7c8c23fe91817a8069f5f');
                        const data = await response.json();
                        
                        this.allEmojis = data;
                        this.categories = [...new Set(data.map(e => e.group))];
                        this.loading = false;
                    } catch (e) {
                        console.error("Failed to load emojis", e);
                    }
                },

                get filteredEmojis() {
                    const searchLower = this.search.toLowerCase();
                    const grouped = {};

                    this.allEmojis.forEach(emoji => {
                        if (emoji.unicodeName.toLowerCase().includes(searchLower)) {
                            if (!grouped[emoji.group]) grouped[emoji.group] = [];
                            grouped[emoji.group].push(emoji);
                        }
                    });

                    return Object.keys(grouped).map(key => ({
                        name: key.replace(/-/g, ' '),
                        items: grouped[key]
                    }));
                },

                copyEmoji(char, el) {
                    navigator.clipboard.writeText(char);
                    const tooltip = el.querySelector('.tooltip');
                    tooltip.classList.remove('opacity-0');
                    tooltip.classList.add('opacity-100');
                    setTimeout(() => {
                        tooltip.classList.remove('opacity-100');
                        tooltip.classList.add('opacity-0');
                    }, 1000);
                },

                scrollToCategory(id) {
                    const el = document.getElementById(id);
                    if (el) {
                        const offset = 120; // Accounts for sticky nav
                        const bodyRect = document.body.getBoundingClientRect().top;
                        const elementRect = el.getBoundingClientRect().top;
                        const elementPosition = elementRect - bodyRect;
                        const offsetPosition = elementPosition - offset;

                        window.scrollTo({
                            top: offsetPosition,
                            behavior: 'smooth'
                        });
                    }
                }
            }
        }
    </script>
</body>
</html>
